name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Resolve package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            const catalog = {'@tanstack/react-query':'^5.90.21','react':'19.1.0','react-dom':'19.1.0','zod':'^3.25.76'};
            for (const [k,v] of Object.entries(pkg.devDependencies||{})) {
              if (v==='catalog:') { if(catalog[k]) pkg.devDependencies[k]=catalog[k]; else delete pkg.devDependencies[k]; }
              if (typeof v==='string'&&v.startsWith('workspace:')) delete pkg.devDependencies[k];
            }
            pkg.name='iptv-player';
            fs.writeFileSync('package.json',JSON.stringify(pkg,null,2));
          "
      - run: npm install --legacy-peer-deps
      - run: npx expo prebuild --platform android --no-install
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      - uses: actions/upload-artifact@v4
        with:
          name: IPTV-Player-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
